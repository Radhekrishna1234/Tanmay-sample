<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Example</title>
</head>
<body>

<h2>Simple JavaScript Demo</h2>

<button onclick="showMessage()">Click Me</button>

<p id="demo"></p>

<script>
function showMessage() {
    document.getElementById("demo").innerHTML = "Hello! JavaScript is working.";
}
</script>

</body>
</html>
